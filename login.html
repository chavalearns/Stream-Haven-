<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream Haven V2 - Login</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="lavender" class="no-sidebar">
  <div class="login-container">
    <div class="login-card">
      <h1>🌙 Stream Haven</h1>
      <p class="subtitle">Your streaming dashboard awaits</p>

      <div class="login-tabs">
        <button class="login-tab active" onclick="showTab('signin')">Sign In</button>
        <button class="login-tab" onclick="showTab('signup')">Sign Up</button>
      </div>

      <!-- Sign In Form -->
      <form id="signinForm" class="login-form active" onsubmit="handleSignIn(event)">
        <div class="form-group">
          <label for="signinEmail">Email</label>
          <input type="email" id="signinEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="signinPassword">Password</label>
          <input type="password" id="signinPassword" placeholder="Your password" required>
        </div>
        <button type="submit" class="btn btn-primary">Sign In</button>
        <div id="signinError" class="login-error"></div>
      </form>

      <!-- Sign Up Form -->
      <form id="signupForm" class="login-form" onsubmit="handleSignUp(event)">
        <div class="form-group">
          <label for="signupName">Display Name</label>
          <input type="text" id="signupName" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label for="signupConfirm">Confirm Password</label>
          <input type="password" id="signupConfirm" placeholder="Confirm password" required>
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
        <div id="signupError" class="login-error"></div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-auth.js"></script>
  <script>
    function showTab(tab) {
      document.querySelectorAll('.login-tab').forEach((t, i) => {
        t.classList.toggle('active', (tab === 'signin' && i === 0) || (tab === 'signup' && i === 1));
      });
      document.getElementById('signinForm').classList.toggle('active', tab === 'signin');
      document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
    }

    async function handleSignIn(e) {
      e.preventDefault();
      const errEl = document.getElementById('signinError');
      errEl.textContent = '';
      const email = document.getElementById('signinEmail').value.trim();
      const password = document.getElementById('signinPassword').value;

      if (!email || !password) { errEl.textContent = 'Please fill in all fields'; return; }

      try {
        await signIn(email, password);
        window.location.href = 'index.html';
      } catch (err) {
        errEl.textContent = err.message || 'Sign in failed';
      }
    }

    async function handleSignUp(e) {
      e.preventDefault();
      const errEl = document.getElementById('signupError');
      errEl.textContent = '';
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;

      if (!name || !email || !password || !confirm) { errEl.textContent = 'Please fill in all fields'; return; }
      if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters'; return; }
      if (password !== confirm) { errEl.textContent = 'Passwords do not match'; return; }

      try {
        await signUp(name, email, password);
        window.location.href = 'index.html';
      } catch (err) {
        errEl.textContent = err.message || 'Sign up failed';
      }
    }
  </script>
</body>
</html>
