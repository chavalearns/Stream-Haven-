<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream Haven V2 - Content Planner</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="no-sidebar">
  <nav class="top-nav">
    <div class="nav-brand"><h2>🌙 Stream Haven</h2></div>
    <div class="nav-links">
      <a href="index.html">Dashboard</a>
      <a href="calendar.html">Calendar</a>
      <a href="planner.html">Streams</a>
      <a href="content-planner.html" class="active">Content</a>
      <a href="goals.html">Goals</a>
      <a href="game.html">Game</a>
      <a href="ideas.html">Ideas</a>
      <a href="growth.html">Growth</a>
      <a href="links.html">Links</a>
      <a href="themes.html">Themes</a>
      <a href="accounts.html">Accounts</a>
      <a href="settings.html">Settings</a>
    </div>
    <div class="nav-user">
      <span class="account-name">Account</span>
      <div id="userEmail"></div>
    </div>
  </nav>

  <main class="main-content-full">
    <div class="page-header">
      <h1>📋 Content Planner</h1>
      <p>Plan and track your content pipeline</p>
    </div>

    <div class="card" style="margin-bottom:1.5rem">
      <h3 style="margin-bottom:1rem;color:var(--accent)">Add Content</h3>
      <div class="form-row">
        <div class="form-group">
          <label for="contentTitle">Title</label>
          <input type="text" id="contentTitle" placeholder="Content title">
        </div>
        <div class="form-group">
          <label for="contentType">Type</label>
          <select id="contentType">
            <option value="stream">Stream</option>
            <option value="video">Video</option>
            <option value="short">Short</option>
            <option value="post">Post</option>
          </select>
        </div>
        <div class="form-group">
          <label for="contentDate">Date</label>
          <input type="datetime-local" id="contentDate">
        </div>
        <div class="form-group">
          <label for="contentStatus">Status</label>
          <select id="contentStatus">
            <option value="idea">Idea</option>
            <option value="planning">Planning</option>
            <option value="recording">Recording</option>
            <option value="editing">Editing</option>
            <option value="published">Published</option>
          </select>
        </div>
      </div>
      <div style="margin-top:1rem">
        <button class="btn btn-primary" onclick="addContent()">Add Content</button>
      </div>
    </div>

    <div class="items-list" id="contentList"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-auth.js"></script>
  <script src="js/supabase-app.js"></script>
  <script>window.onDataLoaded = loadContent;</script>
</body>
</html>
