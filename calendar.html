<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream Haven V2 - Calendar</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="no-sidebar">
  <nav class="top-nav">
    <div class="nav-brand"><h2>🌙 Stream Haven</h2></div>
    <div class="nav-links">
      <a href="index.html">Dashboard</a>
      <a href="calendar.html" class="active">Calendar</a>
      <a href="planner.html">Streams</a>
      <a href="content-planner.html">Content</a>
      <a href="goals.html">Goals</a>
      <a href="game.html">Game</a>
      <a href="ideas.html">Ideas</a>
      <a href="growth.html">Growth</a>
      <a href="links.html">Links</a>
      <a href="themes.html">Themes</a>
      <a href="accounts.html">Accounts</a>
      <a href="settings.html">Settings</a>
    </div>
    <div class="nav-user">
      <span class="account-name">Account</span>
      <div id="userEmail"></div>
    </div>
  </nav>

  <main class="main-content-full">
    <div class="page-header">
      <h1>📆 Calendar</h1>
      <p>View your scheduled streams and content</p>
    </div>

    <div class="calendar-container">
      <div class="calendar-nav">
        <button onclick="prevMonth()">← Prev</button>
        <h2 id="calendarMonth"></h2>
        <button onclick="nextMonth()">Next →</button>
      </div>

      <div class="calendar-grid" id="calendarGrid"></div>

      <div class="calendar-legend">
        <div class="legend-item"><div class="legend-dot stream"></div> Streams</div>
        <div class="legend-item"><div class="legend-dot content"></div> Content</div>
      </div>

      <div style="text-align:center;margin-top:1.5rem;display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap">
        <a href="planner.html" class="btn btn-primary">+ Add Stream</a>
        <a href="content-planner.html" class="btn btn-secondary">+ Add Content</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-auth.js"></script>
  <script src="js/supabase-app.js"></script>
  <script>window.onDataLoaded = initCalendar;</script>
</body>
</html>
